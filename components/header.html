<!-- =========================================================
    MASKIIN CAAWIYE
    PREMIUM HEADER v2.0
========================================================= -->

<header class="mc-header">

<!-- LEFT -->

<div class="mc-header-left">

    <a href="dashboard.html" class="mc-brand">

        <div class="mc-logo">
            <i class="bi bi-heart-pulse-fill text-danger"></i>
        </div>

        <div class="mc-brand-info">

            <h5 class="mc-app-title">

                Maskiin Caawiye

            </h5>

            <small
                class="mc-app-subtitle">

                NGO Management

            </small>


        </div>

    </a>

</div>
    <!-- CENTER -->

    <div class="mc-header-center">

        <div class="mc-date-card">
    
            <i class="bi bi-calendar-event text-primary"></i>
    
            <span id="headerDateDesktop">

                Loading...
            
            </span>
    
        </div>
    
    </div>


    <div class="mc-header-right">

        <!-- Notification -->

        <button
            id="notificationBtn"
            class="mc-icon-btn"
            type="button"
            aria-label="Notifications">

            <i class="bi bi-bell-fill"></i>

            <span
                class="mc-badge"
                id="notifCount">

                0

            </span>

        </button>


        <!-- Language -->

        <div class="dropdown mc-desktop-only">

            <button
                class="mc-icon-btn dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                aria-label="Language">

                <i class="bi bi-translate"></i>

            </button>

            <ul class="dropdown-menu dropdown-menu-end">

                <li>

                    <button
                        class="dropdown-item"
                        onclick="setLanguage('en')">

                        🇺🇸 English

                    </button>

                </li>

                <li>

                    <button
                        class="dropdown-item"
                        onclick="setLanguage('so')">

                        🇸🇴 Soomaali

                    </button>

                </li>

            </ul>

        </div>


        <!-- Theme -->

        <button
            class="mc-icon-btn mc-desktop-only"
            type="button"
            onclick="toggleTheme()"
            aria-label="Theme">

            <i
                id="themeIcon"
                class="bi bi-moon-stars-fill">
            </i>

        </button>


        <!-- Profile -->

        <div class="dropdown mc-desktop-only">

            <button
                class="mc-user-btn dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">

                <div
                    class="mc-avatar"
                    id="adminAvatar">
                </div>

                <div class="mc-user-info">

                    <span
                        class="mc-user-name"
                        id="adminName">

                        Administrator

                    </span>

                </div>

            </button>

            <ul class="dropdown-menu dropdown-menu-end">

                <li class="px-3 py-2">

                    <strong id="adminFullName">

                        Administrator

                    </strong>

                </li>

                <li>
                    <hr class="dropdown-divider">
                </li>

                <li>

                    <a
                        class="dropdown-item"
                        href="settings.html">

                        <i class="bi bi-gear me-2"></i>

                        Settings

                    </a>

                </li>

                <li>

                    <button
                        class="dropdown-item text-danger"
                        onclick="logout()">

                        <i class="bi bi-box-arrow-right me-2"></i>

                        Logout

                    </button>

                </li>

            </ul>

        </div>


        <!-- Mobile Menu -->

        <button
            class="mc-icon-btn mc-mobile-only"
            id="mobileMenuBtn"
            type="button"
            aria-label="Menu">

            <i class="bi bi-three-dots-vertical"></i>

        </button>

    </div>


</header>

<div
    class="mc-mobile-menu"
    id="mobileMenu"
    role="menu">

    <a href="profile.html">

        <i class="bi bi-person-circle text-success"></i>

        <div>

            <strong>Profile</strong>

            <small class="d-block text-muted">
                View Profile
            </small>

        </div>

    </a>

    <hr class="m-0">

    <button
        onclick="toggleTheme()"
        class="justify-content-between">

        <span>

            <i
                id="mobileThemeIcon"
                class="bi bi-moon-stars-fill text-warning me-2">

            </i>

            Dark Mode

        </span>

        <span
            id="themeStatus"
            class="badge bg-success">

            ON

        </span>

    </button>

    <hr class="m-0">

    <button
        onclick="toggleLanguage()"
        class="justify-content-between">

        <span>

            <i class="bi bi-translate text-primary me-2"></i>

            <span id="languageLabel">

                Language

            </span>

        </span>

        <span
            id="languageStatus"
            class="badge bg-primary">

            ENG

        </span>

    </button>

    <hr class="m-0">

    <a href="settings.html">

        <i class="bi bi-gear-fill text-secondary"></i>

        Settings

    </a>

</div>
<!-- =========================================================
    NOTIFICATION MODAL
========================================================= -->

<div
    class="modal fade"
    id="notificationModal"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-dialog-scrollable modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5>

                    <i class="bi bi-bell-fill me-2"></i>

                    Notifications

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div
                class="modal-body"
                id="notificationList">

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-outline-success"
                    onclick="markAllNotificationsRead()">

                    <i class="bi bi-check2-all"></i>

                    Mark All Read

                </button>

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Close

                </button>

            </div>

        </div>

    </div>

</div>


<!-- =========================================================
    GLOBAL TOAST
========================================================= -->

<div
    class="toast-container position-fixed bottom-0 end-0 p-3"
    id="toastContainer">

</div>
