<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maskiin Caawiye - Reports & Analytics</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (IMPORTANT for navbar icons) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- App Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reports.css">
</head>

<body class="bg-body-tertiary">

    <!-- HEADER (same system as other pages) -->
    <div id="headerContainer"></div>

    <!-- PAGE CONTENT -->
    <main class="page-content">

        <div class="container-fluid px-3 px-md-4 pb-5">

        <!-- Compile Custom Export Pipeline Controls Card -->
        <div class="card p-3 mb-4 shadow-sm border-0">
            <h6 class="fw-bold text-primary mb-3 text-uppercase" id="lblPipelineTitle">
                Compile Custom Export Pipeline
            </h6>

            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary">Region</label>
                    <select id="pipelineRegion" class="form-select">
                        <option value="all">All Regions</option>
                        <option value="banadir">Banadir</option>
                        <option value="puntland">Puntland</option>
                        <option value="somaliland">Somaliland</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary">Time Window</label>
                    <select id="pipelineTime" class="form-select">
                        <option value="all">All Time</option>
                        <option value="today">Today</option>
                        <option value="month">This Month</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-secondary">Gateway Filter</label>
                    <select id="reportGatewayFilter" class="form-select">
                        <option value="all">All Gateways</option>
                        <option value="EVCPlus">EVC Plus</option>
                        <option value="SomNet">SomNet</option>
                        <option value="eDahab">eDahab</option>
                    </select>
                </div>
            </div>

            <div class="row g-2 mt-2">
                <div class="col-md-4">
                    <button class="btn btn-primary w-100 fw-bold" onclick="runRecalculateAnalytics()">
                        Refresh
                    </button>
                </div>

                <div class="col-md-4">
                    <button class="btn btn-success w-100 fw-bold" onclick="exportToExcelEngine()">
                        Export Excel
                    </button>
                </div>

                <div class="col-md-4">
                    <button class="btn btn-danger w-100 fw-bold" onclick="triggerPDFDownload()">
                        Download PDF
                    </button>
                </div>
            </div>
        </div>

        <!-- Metrics -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="analytics-card">
                    <h5 class="fw-bold text-secondary">Total Volume</h5>
                    <h2 class="fw-bold text-primary" id="txtTotalVolume">$0.00</h2>
                </div>
            </div>

            <div class="col-md-6">
                <div class="analytics-card">
                    <h5 class="fw-bold text-secondary">Transaction Count</h5>
                    <h2 class="fw-bold text-success" id="txtTotalCount">0</h2>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card p-3 shadow-sm border-0 mb-5">
            <h5 class="mb-3 text-secondary fw-bold">
                Beneficiary Report
            </h5>

            <div class="table-responsive">
                <table class="table table-hover align-middle m-0" id="exportTargetTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Transactions</th>
                            <th>Total Sent</th>
                            <th>Average</th>
                            <th>Last Activity</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>

            <div id="mobileReportLayout"></div>
        </div>

    </div>

</main>

<div id="navbarContainer"></div>

    <!-- SCRIPTS (FIXED ORDER — THIS IS THE KEY FIX) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/storage.js"></script>

    <!-- IMPORTANT: header FIRST -->
    <script src="js/header.js"></script>

    <!-- THEN navbar -->
    <script src="js/navbar.js"></script>

    <!-- THEN page logic -->
    <script src="js/reports.js"></script>

</body>
</html>
