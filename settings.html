<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maskiin Caawiye - Control Settings Panel</title>

    <!-- 🔥 FIX: Global base path for navbar fetch -->
    <base href="/">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (important for navbar icons) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- App Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/settings.css">
</head>

<body class="bg-body-tertiary">

    <!-- HEADER (same system as other pages) -->
    <div id="headerContainer"></div>

    <!-- PAGE CONTENT -->
    <main class="page-content">

        <div class="container-fluid px-3 px-md-4 pb-5">

        <div class="settings-card">
            <h5 class="fw-bold text-primary mb-4" id="lblPreferencesHeading">
                App Preference Settings
            </h5>

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-semibold" id="lblLanguageSelect">
                        Interface Language (Luuqadda)
                    </label>
                    <select id="sysLanguageSelector" class="form-select">
                        <option value="en">English (US)</option>
                        <option value="so">Somali (Soomaali)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold" id="lblThemeSelect">
                        Visual Mode Theme
                    </label>
                    <select id="sysThemeSelector" class="form-select">
                        <option value="light">Light Mode</option>
                        <option value="dark">Dark Mode</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="settings-card">
            <h5 class="fw-bold text-success mb-3" id="lblBackupHeading">
                Database Backup & Recovery
            </h5>

            <p class="text-secondary small mb-4" id="lblBackupDesc">
                Download your JSON backup or restore previous data safely.
            </p>

            <div class="row g-3">
                <div class="col-md-6">
                    <button class="btn btn-success w-100 fw-bold"
                        onclick="executeDatabaseBackup()"
                        id="btnDownloadBackup">
                        Download System Backup (.JSON)
                    </button>
                </div>

                <div class="col-md-6">
                    <input type="file"
                        id="importDatabaseFile"
                        class="form-control d-none"
                        accept=".json"
                        onchange="executeDatabaseRestore(event)">

                    <button class="btn btn-outline-success w-100 fw-bold"
                        onclick="document.getElementById('importDatabaseFile').click()"
                        id="btnUploadRestore">
                        Upload & Restore Database File
                    </button>
                </div>
            </div>
        </div>

        <div class="settings-card border border-danger border-opacity-25">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h5 class="fw-bold text-danger m-0" id="lblTrashHeading">
                        System Recycle Bin (Trash)
                    </h5>
                    <p class="text-secondary small m-0 mt-1" id="lblTrashDesc">
                        Review, restore, or permanently delete items.
                    </p>
                </div>

                <button class="btn btn-sm btn-outline-danger fw-bold"
                    onclick="emptyEntireRecycleBin()"
                    id="btnEmptyBin">
                    Wipe Trash Completely
                </button>
            </div>

            <div class="table-responsive border rounded bg-body mt-3">
                <table class="table align-middle m-0 small">
                    <thead class="table-dark">
                        <tr>
                            <th id="thType">Type</th>
                            <th id="thIdentifier">ID</th>
                            <th id="thDesc">Description</th>
                            <th class="text-center" id="thActions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="trashRegisterTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

</main>

<div id="navbarContainer"></div>

    <!-- SCRIPTS (FIXED ORDER) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/header.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/settings.js"></script>

</body>
</html>
